name: sharebite
description: ShareBite - Share Food, Share Love

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.2

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Maps (OpenStreetMap — no API key needed)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  timeago: ^3.6.0
  intl: ^0.19.0

  # Utils
  permission_handler: ^11.2.0
  url_launcher: ^6.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
